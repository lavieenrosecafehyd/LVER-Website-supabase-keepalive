name: Lighthouse

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://lavieenrosecafe.in
            https://lavieenrosecafe.in/menu.html
            https://lavieenrosecafe.in/locations.html
            https://lavieenrosecafe.in/franchise.html
          uploadArtifacts: true
          temporaryPublicStorage: true
